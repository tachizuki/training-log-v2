function doImport(){
  const existing=JSON.parse(localStorage.getItem("training_records")||"[]");
  const merged=[...existing]; let added=0,updated=0;
  for(const rec of importData){
    const idx=merged.findIndex(r=>r.date===rec.date);
    if(idx>=0){merged[idx]=rec;updated++;}else{merged.push(rec);added++;}
  }
  merged.sort((a,b)=>b.date.localeCompare(a.date));
  localStorage.setItem("training_records",JSON.stringify(merged));
  document.getElementById("done").style.display="block";
  document.getElementById("count").textContent=`追加: ${added}件 / 更新: ${updated}件 / 合計: ${merged.length}件`;
}
