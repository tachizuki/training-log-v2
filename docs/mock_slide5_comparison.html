<title>案A モック比較</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f1a; font-family: sans-serif; color: #ccc; padding: 40px; display: flex; gap: 60px; justify-content: center; align-items: flex-start; }
.col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.label { font-size: 12px; color: #888; letter-spacing: 0.1em; }

/* スライド本体 */
.slide { width: 270px; height: 480px; border-radius: 20px; overflow: hidden; position: relative;
  background: linear-gradient(160deg,#1a102e 0%,#110a1f 50%,#08050f 100%);
  box-shadow: 0 16px 48px rgba(0,0,0,0.6); flex-shrink:0; }
.slide-bg { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px; }
.slide-tag { display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;margin-bottom:8px;
  background:rgba(167,139,250,0.15);color:#a78bfa;border:1px solid rgba(167,139,250,0.3); }
.slide-title { font-size:18px;font-weight:900;line-height:1.25;margin-bottom:6px;color:#f0f0f0;text-align:center; }
.slide-sub { font-size:10px;opacity:0.75;line-height:1.5;color:#aaa;text-align:center;margin-bottom:16px; }

/* 電話フレーム */
.phone-frame { width:140px;height:270px;background:#0a0a0a;border-radius:22px;
  border:2.5px solid rgba(255,255,255,0.15);overflow:hidden;
  box-shadow:0 12px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08); }
.phone-frame img { width:100%;height:100%;object-fit:cover; }
.phone-frame img.top { object-position: top center; }
</style>
